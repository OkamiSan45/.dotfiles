# Alacritty Configuration (assuming TOML support)

# Font settings
[font]
family = "Fira Code"
size = 10
weight = "Regular"
ligatures = true

# Cursor settings
[cursor]
color = "#56526e"
shape = "Block"

# Text rendering settings
# Note: Alacritty does not have direct settings for antialiasing or ClearType
# These settings are usually managed by the system or font itself


[cursor_colors]
text = "#e0def4"
cursor = "#56526e"

[vi_mode_cursor_colors]
text = "#e0def4"
cursor = "#56526e"

[selection_colors]
text = "#e0def4"
background = "#44415a"

[normal_colors]
black = "#393552"
red = "#eb6f92"
green = "#3e8fb0"
yellow = "#f6c177"
blue = "#9ccfd8"
magenta = "#c4a7e7"
cyan = "#ea9a97"
white = "#e0def4"

[bright_colors]
black = "#6e6a86"
red = "#eb6f92"
green = "#3e8fb0"
yellow = "#f6c177"
blue = "#9ccfd8"
magenta = "#c4a7e7"
cyan = "#ea9a97"
white = "#e0def4"

[hints_colors]
start_foreground = "#908caa"
start_background = "#2a273f"
end_foreground = "#6e6a86"
end_background = "#2a273f"

# Line spacing (not typically supported directly in Alacritty)
# Adjust via font size or other settings

# Note: Alacritty does not use TOML as of the latest documentation
# Configuration is primarily done using YAML
