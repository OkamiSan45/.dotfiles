# Alacritty Configuration

[colors.primary]
background = '#232136'
foreground = '#e0def4'

[colors.cursor]
text = '#e0def4'
cursor = '#56526e'

[colors.vi_mode_cursor]
text = '#e0def4'
cursor = '#56526e'

[colors.selection]
text = '#e0def4'
background = '#44415a'

[colors.normal]
black = '#393552'
red = '#eb6f92'
green = '#3e8fb0'
yellow = '#f6c177'
blue = '#9ccfd8'
magenta = '#c4a7e7'
cyan = '#ea9a97'
white = '#e0def4'

[colors.bright]
black = '#6e6a86'
red = '#eb6f92'
green = '#3e8fb0'
yellow = '#f6c177'
blue = '#9ccfd8'
magenta = '#c4a7e7'
cyan = '#ea9a97'
white = '#e0def4'

[colors.hints]
start = { foreground = '#908caa', background = '#2a273f' }
end = { foreground = '#6e6a86', background = '#2a273f' }

# Font configuration
[font]
normal.family = "Fira Code"
normal.style = "Regular"
bold.family = "Fira Code"
bold.style = "Bold"
italic.family = "Fira Code"
italic.style = "Italic"
size = 11.0
offset.x = 0
offset.y = 0

# Window dimensions
[window]
padding.x = 5
padding.y = 5
dynamic_padding = false
startup_mode = "Windowed"
decorations = "full"
transparency = 0.0

# Key bindings
[key_bindings]
key = "V"
mods = "Control|Shift"
action = "Paste"
[key_bindings]
key = "C"
mods = "Control|Shift"
action = "Copy"
[key_bindings]
key = "V"
mods = "Control"
action = "Paste"

[key_bindings]
key = "C"
mods = "Control"
action = "Copy"
[key_bindings]
key = "F11"
action = "ToggleFullscreen"

# Scrolling
[mouse]
hide_when_typing = true
url.launcher = "xdg-open"

# Background
background_opacity = 1.0

# Bells
[bell]
animation = "Ease"
duration = 0.5

# Terminal behavior
[shell]
program = "/bin/bash"
args = ["--login"]

# Performance
[performance]
fps = 60
