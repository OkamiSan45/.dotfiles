# Alacritty Configuration

[font]
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }
bold_italic = { family = "monospace", style = "BoldItalic" }
size = 10.0
use_thin_strokes = false

[colors]
  [colors.primary]
  background = "#232136"
  foreground = "#e0def4"

  [colors.cursor]
  text = "#e0def4"
  cursor = "#56526e"

  [colors.vi_mode_cursor]
  text = "#e0def4"
  cursor = "#56526e"

  [colors.selection]
  text = "#e0def4"
  background = "#44415a"

  [colors.normal]
  black = "#393552"
  red = "#eb6f92"
  green = "#3e8fb0"
  yellow = "#f6c177"
  blue = "#9ccfd8"
  magenta = "#c4a7e7"
  cyan = "#ea9a97"
  white = "#e0def4"

  [colors.bright]
  black = "#6e6a86"
  red = "#eb6f92"
  green = "#3e8fb0"
  yellow = "#f6c177"
  blue = "#9ccfd8"
  magenta = "#c4a7e7"
  cyan = "#ea9a97"
  white = "#e0def4"

  [colors.hints]
  start = { foreground = "#908caa", background = "#2a273f" }
  end = { foreground = "#6e6a86", background = "#2a273f" }

[scrolling]
history = 10000
multiplier = 3

[key_bindings]
  [[key_bindings.binding]]
  key = "V"
  mods = ["Control", "Shift"]
  action = "Paste"

  [[key_bindings.binding]]
  key = "C"
  mods = ["Control", "Shift"]
  action = "Copy"

  [[key_bindings.binding]]
  key = "Q"
  mods = ["Control", "Shift"]
  action = "Quit"

  [[key_bindings.binding]]
  key = "F11"
  action = "ToggleFullscreen"

[mouse]
double_click = { threshold = 300 }
triple_click = { threshold = 300 }

live_config_reload = true

[shell]
program = "/bin/zsh"
args = ["-l"]

#[debug]
#persistent_logging = true
#log_level = "info"

